# render.yaml — KibaAlo v2.0 Backend
services:
  - type: web
    name: kibaalo-backend
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: NODE_ENV
        value: production
      - key: MAX_DELIVERY_RADIUS_KM
        value: "15"
      - key: FRONTEND_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: ORANGE_MONEY_CLIENT_ID
        sync: false
      - key: ORANGE_MONEY_CLIENT_SECRET
        sync: false
      - key: ORANGE_MONEY_MERCHANT_KEY
        sync: false
      - key: MOOV_MONEY_TOKEN
        sync: false
      - key: WAVE_API_KEY
        sync: false
      - key: MTN_SUBSCRIPTION_KEY
        sync: false
      - key: AIRTEL_CLIENT_ID
        sync: false
      - key: AIRTEL_CLIENT_SECRET
        sync: false
